<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>การอนุมัติ</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/admin-approval.css">
</head>
<body>

  <header class="admin-header">
    <div class="header-brand">
      <img src="pic/Logo.png" alt="logo" class="header-logo">
      <span class="header-title">ระบบผู้ดูแล</span>
    </div>
    <div class="header-user">
      <span class="admin-greeting">สวัสดี, <strong id="adminName">ผู้ดูแลระบบ</strong></span>
      <button id="logoutBtn" class="logout-btn">ออกจากระบบ</button>
    </div>
  </header>

  <nav class="admin-tabs">
    <a href="admin-approval.html" class="tab-btn active">การอนุมัติ</a>
    <a href="admin-status.html"   class="tab-btn">การเช่า</a>
    <a href="admin-returns.html"  class="tab-btn">การคืนห้อง</a>
    <a href="admin-packages.html" class="tab-btn">แพ็กเกจ</a>
    <a href="admin-rooms.html"    class="tab-btn">ห้องสตูดิโอ</a>
    <a href="admin-users.html"    class="tab-btn">สมาชิก</a>
    <a href="user/home.html"      class="tab-btn" style="margin-left:auto;background:#6a0dad;color:#fff;">🌐 ดูเว็บไซต์</a>  </nav>

  <main class="admin-content">
    <section class="tab-panel active">
      <div class="panel-header">
        <h2>รายการรอการอนุมัติ</h2>
      </div>
      <div id="approval-list" class="approval-list"></div>
    </section>
  </main>

  <!-- Slip viewer modal -->
  <div id="slip-modal" class="modal-overlay">
    <div class="slip-modal-box">
      <h3 id="slip-modal-title">สลิปการชำระเงิน</h3>
      <img id="slip-img" class="slip-img-viewer" src="" alt="สลิป" style="display:none;">
      <p id="slip-no-img" style="color:#9b6bc5;display:none;"></p>
      <div class="slip-meta" id="slip-meta"></div>
      <div class="slip-actions">
        <a id="slip-open-link" class="btn-open-new" href="#" target="_blank" rel="noopener">เปิดในแท็บใหม่</a>
        <button class="btn-cancel" onclick="closeSlipModal()">ปิด</button>
      </div>
    </div>
  </div>

  <!-- Modal ข้อความอนุมัติ/ปฏิเสธ -->
  <div id="msg-modal" class="modal-overlay">
    <div class="modal-box">
      <h3 class="modal-title" id="msg-modal-title">ข้อความถึงผู้ใช้</h3>
      <input type="hidden" id="msg-bookingCode">
      <input type="hidden" id="msg-status">
      <div class="form-group">
        <label>ข้อความถึงผู้ใช้ <span style="color:#aaa;font-weight:400;">(ไม่บังคับ)</span></label>
        <textarea id="admin-message" rows="4" placeholder="เช่น กรุณามาตรงเวลา, เตรียมเอกสารให้พร้อม..." style="width:100%;padding:10px;border-radius:10px;border:1.5px solid #d4b8f0;font-family:inherit;font-size:0.95rem;resize:vertical;"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeMsgModal()">ยกเลิก</button>
        <button class="btn-save" onclick="confirmStatus()">ยืนยัน</button>
      </div>
    </div>
  </div>

  <script src="js/admin-approval.js"></script>
</body>
</html>
