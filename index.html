<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ</title>
    <link rel="stylesheet" href="css/login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="wrapper">
        <form>
            <img src="pic/Logo.png" class="login-title" alt="Pixel Studio">
            <div class="input-box">
                <input id="email" type="email" placeholder="อีเมล" required>
                <i class="bx bx-envelope"></i>
            </div>

            <div class="input-box">
                <input id="password" type="password" placeholder="รหัสผ่าน" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <button type="button" id="btnLogin" class="btn">เข้าสู่ระบบ</button>

            <div class="register-link">
                <p><a href="register.html">สมัครสมาชิก</a></p>
            </div>
        </form>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
