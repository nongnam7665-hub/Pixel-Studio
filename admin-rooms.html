<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ข้อมูลห้องสตูดิโอ</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/admin-rooms.css">
</head>
<body>

  <header class="admin-header">
    <div class="header-brand">
      <img src="pic/Logo.png" alt="logo" class="header-logo">
      <span class="header-title">ระบบผู้ดูแล</span>
    </div>
    <div class="header-user">
      <span class="admin-greeting">สวัสดี, <strong id="adminName">ผู้ดูแลระบบ</strong></span>
      <button id="logoutBtn" class="logout-btn">ออกจากระบบ</button>
    </div>
  </header>

  <nav class="admin-tabs">
    <a href="admin-approval.html" class="tab-btn">การอนุมัติ</a>
    <a href="admin-status.html"   class="tab-btn">การเช่า</a>
    <a href="admin-returns.html"  class="tab-btn">การคืนห้อง</a>
    <a href="admin-packages.html" class="tab-btn">แพ็กเกจ</a>
    <a href="admin-rooms.html"    class="tab-btn active">ห้องสตูดิโอ</a>
    <a href="admin-users.html"    class="tab-btn">สมาชิก</a>
    <a href="user/home.html"      class="tab-btn tab-btn-website">🌐 ดูเว็บไซต์</a>
  </nav>

  <main class="admin-content">
    <section class="tab-panel active">
      <div class="panel-header">
        <h2>ข้อมูลห้องสตูดิโอ</h2>
        <button class="btn-add-theme" id="btn-add-room">+ เพิ่มห้อง</button>
      </div>
      <div class="rooms-grid" id="rooms-grid"></div>
    </section>

    <section class="tab-panel active section-themes">
      <div class="panel-header">
        <h2>ธีมการถ่ายภาพ</h2>
        <button class="btn-add-theme" id="btn-add-theme">+ เพิ่มธีม</button>
      </div>
      <div class="themes-admin-grid" id="themes-grid"></div>
    </section>
  </main>

  <!-- Modal แก้ไข/เพิ่มห้อง -->
  <div id="modal" class="modal-overlay">
    <div class="modal-box">
      <h3 class="modal-title" id="room-modal-title">แก้ไขข้อมูลห้องสตูดิโอ</h3>
      <input type="hidden" id="edit-id">
      <div class="form-group" id="room-id-group">
        <label>รหัสห้อง (เช่น E, F)</label>
        <input type="text" id="edit-new-id" placeholder="E" maxlength="5">
      </div>

      <!-- รูปภาพ -->
      <div class="form-group">
        <label>รูปภาพห้อง</label>
        <div class="img-upload-area" id="img-upload-area">
          <img id="img-preview" class="img-preview" alt="ตัวอย่างรูป">
          <div id="upload-placeholder">
            <div class="upload-icon">📷</div>
            <div class="upload-hint">คลิกเพื่อเลือกรูปภาพ</div>
            <div class="upload-hint">JPG, PNG, WEBP</div>
          </div>
          <input type="file" id="file-input" accept="image/*">
        </div>
      </div>

      <div class="form-group">
        <label>ชื่อห้อง</label>
        <input type="text" id="edit-name" placeholder="ชื่อห้อง">
      </div>
      <div class="form-group">
        <label>คำอธิบาย</label>
        <textarea id="edit-description" placeholder="คำอธิบาย"></textarea>
      </div>
      <div class="form-group">
        <label>ความจุ (คน)</label>
        <input type="number" id="edit-capacity" min="1" max="50">
      </div>
      <div class="form-group">
        <label>สถานะ</label>
        <select id="edit-status">
          <option value="available">พร้อมใช้งาน</option>
          <option value="unavailable">ไม่พร้อมใช้งาน</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel-room">ยกเลิก</button>
        <button class="btn-save" id="btn-save-room">บันทึก</button>
      </div>
    </div>
  </div>

  <!-- Modal แก้ไข/เพิ่มธีม -->
  <div id="theme-modal" class="modal-overlay">
    <div class="modal-box">
      <h3 class="modal-title" id="theme-modal-title">แก้ไขธีม</h3>
      <input type="hidden" id="theme-edit-id">

      <div id="theme-slug-group">
        <input type="hidden" id="theme-edit-slug">
      </div>

      <div class="form-group">
        <label>รูปภาพธีม <span class="hint-label">(ถ้าไม่ใส่จะใช้สีกราเดียนต์)</span></label>
        <div class="img-upload-area" id="theme-img-upload-area">
          <img id="theme-img-preview" class="img-preview" alt="ตัวอย่าง">
          <div id="theme-upload-placeholder">
            <div class="upload-icon">🖼️</div>
            <div class="upload-hint">คลิกเพื่อเลือกรูปภาพ</div>
            <div class="upload-hint">JPG, PNG, WEBP</div>
          </div>
          <input type="file" id="theme-file-input" accept="image/*">
        </div>
      </div>

      <div class="form-group">
        <label>ชื่อธีม</label>
        <input type="text" id="theme-edit-name" placeholder="ชื่อธีม">
      </div>
      <div class="form-group">
        <label>คำอธิบาย</label>
        <textarea id="theme-edit-description" placeholder="คำอธิบาย..."></textarea>
      </div>
      <div class="form-group">
        <label>ราคาเพิ่มเติม (บาท)</label>
        <input type="number" id="theme-edit-price" min="0" value="0">
      </div>
      <div class="form-group">
        <label>สีกราเดียนต์ซ้าย</label>
        <div class="color-row">
          <input type="color" id="theme-color1-picker">
          <input type="text" id="theme-color1-text" placeholder="#ffffff" maxlength="7">
        </div>
      </div>
      <div class="form-group">
        <label>สีกราเดียนต์ขวา</label>
        <div class="color-row">
          <input type="color" id="theme-color2-picker">
          <input type="text" id="theme-color2-text" placeholder="#f0f0f0" maxlength="7">
        </div>
      </div>
      <div class="form-group">
        <label>ตัวอย่างกราเดียนต์</label>
        <div id="theme-gradient-preview"></div>
      </div>
      <div class="form-group">
        <label>ลำดับแสดง</label>
        <input type="number" id="theme-edit-sort" min="0" value="0">
      </div>
      <div class="form-group">
        <label class="theme-active-label">
          <input type="checkbox" id="theme-edit-active" checked class="theme-checkbox">
          เปิดใช้งาน
        </label>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel-theme">ยกเลิก</button>
        <button class="btn-save" id="btn-save-theme">บันทึก</button>
      </div>
    </div>
  </div>

  <script src="js/admin-rooms.js"></script>
</body>
</html>
