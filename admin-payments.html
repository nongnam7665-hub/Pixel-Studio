<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ข้อมูลการชำระเงิน</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/admin-payments.css">
</head>
<body>

  <header class="admin-header">
    <div class="header-brand">
      <img src="pic/Logo.png" alt="logo" class="header-logo">
      <span class="header-title">ระบบผู้ดูแล</span>
    </div>
    <div class="header-user">
      <span class="admin-greeting">สวัสดี, <strong id="adminName">ผู้ดูแลระบบ</strong></span>
      <button id="logoutBtn" class="logout-btn">ออกจากระบบ</button>
    </div>
  </header>

  <nav class="admin-tabs">
    <a href="admin-users.html"    class="tab-btn">สมาชิก</a>
    <a href="admin-rooms.html"    class="tab-btn">ห้องสตูดิโอ</a>
    <a href="admin-packages.html" class="tab-btn">แพ็กเกจ</a>
    <a href="admin-approval.html" class="tab-btn">การอนุมัติ</a>
    <a href="admin-status.html"   class="tab-btn">การเช่า</a>
    <a href="admin-returns.html"  class="tab-btn">การคืนห้อง</a>
    <a href="user/home.html"      class="tab-btn" style="margin-left:auto;background:#6a0dad;color:#fff;">🌐 ดูเว็บไซต์</a>
  </nav>

  <main class="admin-content">
    <section class="tab-panel active">
      <div class="panel-header">
        <h2>ข้อมูลการชำระเงิน</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>รหัสเช่า</th>
              <th>ชื่อผู้ชำระ</th>
              <th>เบอร์โทร</th>
              <th>วิธีชำระ</th>
              <th>จำนวนเงิน (บาท)</th>
              <th>วันที่ชำระ</th>
              <th>สลิป</th>
              <th>สถานะ</th>
              <th>จัดการ</th>
            </tr>
          </thead>
          <tbody id="payments-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Slip viewer modal -->
  <div id="slip-modal" class="modal-overlay">
    <div class="slip-modal-box">
      <h3 id="slip-modal-title">สลิปการชำระเงิน</h3>
      <img id="slip-img" class="slip-img-viewer" src="" alt="สลิป" style="display:none;">
      <p id="slip-no-img" style="color:#9b6bc5; display:none;">ไม่สามารถแสดงสลิปประเภทนี้ได้</p>
      <div class="slip-meta" id="slip-meta"></div>
      <div class="slip-actions">
        <a id="slip-open-link" class="btn-open-new" href="#" target="_blank" rel="noopener">เปิดในแท็บใหม่</a>
        <button class="btn-cancel" onclick="closeSlipModal()">ปิด</button>
      </div>
    </div>
  </div>

  <!-- Modal แก้ไขการชำระเงิน -->
  <div id="modal" class="modal-overlay">
    <div class="modal-box">
      <h3 class="modal-title">แก้ไขข้อมูลการชำระเงิน</h3>
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label>ชื่อผู้ชำระ</label>
        <input type="text" id="edit-payerName">
      </div>
      <div class="form-group">
        <label>เบอร์โทร</label>
        <input type="text" id="edit-payerPhone">
      </div>
      <div class="form-group">
        <label>วิธีชำระเงิน</label>
        <select id="edit-paymentMethod">
          <option value="โอนเงิน">โอนเงิน</option>
          <option value="เงินสด">เงินสด</option>
          <option value="บัตรเครดิต">บัตรเครดิต</option>
          <option value="พร้อมเพย์">พร้อมเพย์</option>
        </select>
      </div>
      <div class="form-group">
        <label>จำนวนเงิน (บาท)</label>
        <input type="number" id="edit-paidAmount" min="0">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
        <button class="btn-save" onclick="savePayment()">บันทึก</button>
      </div>
    </div>
  </div>

  <script src="js/admin-payments.js"></script>
</body>
</html>
