<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ข้อมูลการคืนห้อง</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <header class="admin-header">
    <div class="header-brand">
      <img src="pic/Logo.png" alt="logo" class="header-logo">
      <span class="header-title">ระบบผู้ดูแล</span>
    </div>
    <div class="header-user">
      <span class="admin-greeting">สวัสดี, <strong id="adminName">ผู้ดูแลระบบ</strong></span>
      <button id="logoutBtn" class="logout-btn">ออกจากระบบ</button>
    </div>
  </header>

  <nav class="admin-tabs">
    <a href="admin-users.html"    class="tab-btn">สมาชิก</a>
    <a href="admin-rooms.html"    class="tab-btn">ห้องสตูดิโอ</a>
    <a href="admin-packages.html" class="tab-btn">แพ็กเกจ</a>
    <a href="admin-bookings.html" class="tab-btn">การเช่า</a>
    <a href="admin-payments.html" class="tab-btn">การชำระเงิน</a>
    <a href="admin-approval.html" class="tab-btn">การอนุมัติ</a>
    <a href="admin-status.html"   class="tab-btn">สถานะการเช่า</a>
    <a href="admin-returns.html"  class="tab-btn active">การคืนห้อง</a>
    <a href="user/home.html"      class="tab-btn" style="margin-left:auto;background:#6a0dad;color:#fff;">🌐 ดูเว็บไซต์</a>
  </nav>

  <main class="admin-content">
    <section class="tab-panel active">
      <div class="panel-header">
        <h2>ข้อมูลการคืนห้องและอุปกรณ์</h2>
        <button class="refresh-btn" onclick="loadReturns()">รีเฟรช</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>รหัสจอง</th>
              <th>วันที่คืน</th>
              <th>สภาพห้อง</th>
              <th>หมายเหตุอุปกรณ์</th>
              <th>สถานะ</th>
              <th>จัดการ</th>
            </tr>
          </thead>
          <tbody id="returns-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Modal แก้ไขการคืนห้อง -->
  <div id="modal" class="modal-overlay">
    <div class="modal-box">
      <h3 class="modal-title">แก้ไขข้อมูลการคืนห้อง</h3>
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label>วันที่คืน</label>
        <input type="text" id="edit-returnDateDisplay" placeholder="วว/ดด/ปปปป" maxlength="10" inputmode="numeric" autocomplete="off">
        <input type="hidden" id="edit-returnDate">
      </div>
      <div class="form-group">
        <label>สภาพห้อง</label>
        <select id="edit-roomCondition">
          <option value="ดี">ดี</option>
          <option value="พอใช้">พอใช้</option>
          <option value="มีความเสียหาย">มีความเสียหาย</option>
        </select>
      </div>
      <div class="form-group">
        <label>หมายเหตุอุปกรณ์</label>
        <textarea id="edit-equipmentNotes" placeholder="หมายเหตุ..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
        <button class="btn-save" onclick="saveReturn()">บันทึก</button>
      </div>
    </div>
  </div>

  <script src="js/admin-returns.js"></script>
</body>
</html>
